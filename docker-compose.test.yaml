services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "3000:3000"
      - "3000:3000/udp"
    environment:
      - CADDY_INGRESS_NETWORKS=web
    labels:
      caddy.local_certs: true
    networks:
      - web

  database:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ufgouifdgjdfg
      POSTGRES_DB: petboarding
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      test:
        aliases:
          - database

  mailhog:
    image: mailhog/mailhog:latest
    logging:
      driver: "none"
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      test:
        aliases:
          - mailhog

  app:
    # image: "ghcr.io/simsustech/petboarding:test"
    build:
      context: .
      args:
        DEBUG: "true"
      secrets:
        - SIMSUSTECH_NPM_TOKEN
      dockerfile: Dockerfile
      target: api
      network: "host"
    depends_on:
      database:
        condition: service_healthy
    labels:
      caddy: localhost:3000
      caddy.reverse_proxy: "{{upstreams 80}}"
      caddy.encode: zstd gzip
    environment:
      # API env variables
      VITE_API_HOST: localhost:3000
      VITE_LICENSE_KEY: undefined
      VITE_TITLE: Petboarding
      VITE_SOURCE_COLOR: "#4EBDC2"
      VITE_SASS_VARIABLE_PRIMARY: "#4EBDC2"
      VITE_SASS_VARIABLE_SECONDARY: "#237175"
      VITE_SASS_VARIABLE_ACCENT: "#C2AF3A"
      POSTGRES_HOST: database
      POSTGRES_DB: petboarding
      POSTGRES_PASSWORD: ufgouifdgjdfg
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      OIDC_COOKIES_KEYS: 7JOoAPoC5232uJiUdDd+7EUuyFFcZqQJwsAQDnoldZI=
      OTP_SECRET: NNXHQ5TPNF2WK53POJUWU53MMVXHE===
      OTP_VALIDITY_SECONDS: 3600
      EMAIL_FOOTER: "Petboarding <info@petboarding.app>"
    command: ["sh", "-c", "npm run migrate:latest && npm run seed:test && npm run start"]
    healthcheck:
      test: curl --fail --insecure http://localhost || exit 1
      interval: 5s
      retries: 5
      start_period: 15s
      timeout: 10s
    networks:
      test:
      web:

secrets:
  SIMSUSTECH_NPM_TOKEN:
    environment: "SIMSUSTECH_NPM_TOKEN" # Local: export SIMSUSTECH_NPM_TOKEN=$(cat ./env/SIMSUSTECH_NPM_TOKEN)

networks:
  test:
  web:
    external: true
