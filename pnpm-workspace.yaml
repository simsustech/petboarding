injectWorkspacePackages: true

packages:
  - packages/*

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - "@vitrify/*"
  - vitrify
  - unocss-preset-quasar
  - "@simsustech/*"
  - "@modular-api/*"
  - unocss
  - "@unocss/*"
  - "@pinia/colada"
  - pg*
  - vite
  - vite
  - oxfmt
  - "@oxfmt/*"
  - oxlint
  - "@oxlint/*"
  - fast-xml-parser
  - playwright
  - playwright-core
  - "@playwright/*"
  - "@types/node"
  - content-type
  - vitest
  - "@vitest/*"

allowBuilds:
  "@parcel/watcher": true
  core-js: true
  esbuild: true
  sharp: true
  simple-git-hooks: true

overrides:
  '@modular-api/api': link:../modular-api/packages/api
  '@modular-api/fastify-checkout': link:../modular-api/packages/fastify-checkout
  '@modular-api/fastify-oidc': link:../modular-api/packages/fastify-oidc
  '@modular-api/oidc-interactions': link:../modular-api/packages/oidc-interactions
